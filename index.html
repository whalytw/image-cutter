<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片格線切割器 - Web版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .preview-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            cursor: grab;
            background-color: #9ca3af;
        }
        .preview-container:active {
            cursor: grabbing;
        }
        .zoom-content {
            position: absolute;
            transform-origin: 0 0;
            /* 棋盤格只在虛擬畫布範圍內 */
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #ffffff;
        }
        /* 當使用者選了純色預覽背景時，覆蓋棋盤格 */
        .zoom-content.solid-preview-bg {
            background-image: none;
        }
        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .drop-zone {
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-4 px-4 font-sans">
    <div class="max-w-screen-2xl mx-auto">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-1">🖼️ 圖片格線切割器</h1>
            <p class="text-gray-500 text-sm">上傳圖片，設定行列，一鍵切割並打包下載</p>
        </div>

        <!-- 控制面板 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                <!-- 第一欄：圖片設定 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-b pb-2">1. 圖片設定</h3>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-700">選擇圖片</label>
                        <input type="file" id="file-input" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                    </div>
                    <!-- 圖片尺寸 + 重新載入並排 -->
                    <div class="flex items-center gap-2">
                        <div id="image-info" class="flex-1 px-2 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-500 bg-gray-50 text-center truncate">尚未上傳</div>
                        <button id="reload-btn" disabled class="flex-shrink-0 py-1.5 px-2 bg-orange-50 border border-orange-300 text-orange-700 text-xs font-semibold rounded-lg hover:bg-orange-100 disabled:opacity-40 disabled:cursor-not-allowed transition-all whitespace-nowrap">🔄 重新載入</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-gray-700">欄數 (Cols)</label>
                            <input type="number" id="cols-input" value="5" min="1" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-gray-700">列數 (Rows)</label>
                            <input type="number" id="rows-input" value="4" min="1" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                    </div>

                    <!-- 調整圖片 -->
                    <div class="space-y-2 pt-1 border-t border-gray-100">
                        <label class="text-sm font-medium text-gray-700">調整圖片</label>
                        <!-- 移動圖片 -->
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="enable-move" class="w-4 h-4 text-blue-600">
                            <span class="text-xs font-semibold text-gray-700">移動圖片</span>
                        </label>
                        <div id="move-controls" class="hidden pl-1 space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500 w-5">X</span>
                                <input type="number" id="img-offset-x" value="0" step="1"
                                    class="w-16 px-1 py-1 border border-gray-300 rounded text-xs text-center outline-none focus:ring-1 focus:ring-blue-400"/>
                                <span class="text-xs text-gray-400">px</span>
                                <span class="text-xs text-gray-500 w-5 ml-1">Y</span>
                                <input type="number" id="img-offset-y" value="0" step="1"
                                    class="w-16 px-1 py-1 border border-gray-300 rounded text-xs text-center outline-none focus:ring-1 focus:ring-blue-400"/>
                                <span class="text-xs text-gray-400">px</span>
                            </div>
                            <button id="reset-move-btn" class="text-xs text-blue-500 hover:underline">↺ 重置位移</button>
                        </div>

                        <!-- 縮放圖片 -->
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="enable-scale-img" class="w-4 h-4 text-blue-600">
                            <span class="text-xs font-semibold text-gray-700">縮放圖片</span>
                        </label>
                        <div id="scale-controls" class="hidden pl-1 space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500 w-5">X</span>
                                <input type="number" id="img-scale-x" value="100" step="0.1" min="0.1"
                                    class="w-16 px-1 py-1 border border-gray-300 rounded text-xs text-center outline-none focus:ring-1 focus:ring-blue-400"/>
                                <span class="text-xs text-gray-400">%</span>
                                <span class="text-xs text-gray-500 w-5 ml-1">Y</span>
                                <input type="number" id="img-scale-y" value="100" step="0.1" min="0.1"
                                    class="w-16 px-1 py-1 border border-gray-300 rounded text-xs text-center outline-none focus:ring-1 focus:ring-blue-400"/>
                                <span class="text-xs text-gray-400">%</span>
                            </div>
                            <button id="reset-scale-btn" class="text-xs text-blue-500 hover:underline">↺ 重置縮放</button>
                        </div>
                    </div>
                </div>

                <!-- 第二欄：去背設定 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-b pb-2">2. 去背</h3>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="bg-remove-option" value="none" checked class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">不去背</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="bg-remove-option" value="remove" class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">去背</span>
                        </label>
                    </div>
                    <div id="bg-remove-options" class="hidden space-y-3">
                        <!-- 去背模式 -->
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-gray-600">去背模式</label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="bg-mode" value="global" checked class="w-3.5 h-3.5 text-blue-600">
                                <span class="text-xs text-gray-700">整張圖所有相符像素</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="bg-mode" value="flood" class="w-3.5 h-3.5 text-blue-600">
                                <span class="text-xs text-gray-700">僅連通區域 (油漆桶)</span>
                            </label>
                        </div>
                        <!-- 容差 -->
                        <div class="space-y-1">
                            <div class="flex justify-between">
                                <label class="text-xs font-medium text-gray-600">容差 (Tolerance)</label>
                                <span id="tolerance-val" class="text-xs text-blue-600 font-bold">30</span>
                            </div>
                            <input type="range" id="tolerance-input" min="0" max="128" value="30" class="w-full h-1.5 accent-blue-500 cursor-pointer"/>
                        </div>
                        <!-- 滴管提示 -->
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-gray-600">取色</label>
                            <button id="eyedropper-btn" class="w-full flex items-center justify-center gap-2 py-1.5 px-3 bg-amber-50 border border-amber-300 text-amber-700 text-xs font-semibold rounded-lg hover:bg-amber-100 transition-all">
                                🩸 點選圖片取色
                            </button>
                            <!-- 顏色顯示 -->
                            <div id="picked-color-display" class="hidden flex items-center gap-2 px-2 py-1.5 bg-gray-50 border border-gray-200 rounded-lg">
                                <div id="picked-color-swatch" class="w-6 h-6 rounded border border-gray-300 flex-shrink-0"></div>
                                <span id="picked-color-text" class="text-xs font-mono text-gray-700"></span>
                            </div>
                        </div>
                        <!-- 暫時背景色 -->
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-gray-600">預覽背景色</label>
                            <div class="flex flex-wrap gap-1.5 items-center">
                                <!-- 透明網格（預設選中） -->
                                <button data-bg="transparent" title="透明網格"
                                    class="preview-bg-btn w-6 h-6 rounded border-2 border-blue-500 flex-shrink-0 ring-2 ring-blue-400"
                                    style="background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:6px 6px;background-position:0 0,0 3px,3px -3px,-3px 0px;"></button>
                                <!-- 7色方塊 -->
                                <button data-bg="#FFFF00" title="黃" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#FFFF00;"></button>
                                <button data-bg="#FF8800" title="橙" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#FF8800;"></button>
                                <button data-bg="#FF00FF" title="洋紅" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#FF00FF;"></button>
                                <button data-bg="#00CC44" title="綠" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#00CC44;"></button>
                                <button data-bg="#0088FF" title="藍" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#0088FF;"></button>
                                <button data-bg="#111111" title="黑" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#111111;"></button>
                                <button data-bg="#FFFFFF" title="白" class="preview-bg-btn w-6 h-6 rounded border border-gray-300 flex-shrink-0" style="background:#FFFFFF;"></button>
                            </div>
                        </div>
                        <!-- 復原按鈕 -->
                        <button id="restore-btn" class="w-full py-1.5 px-3 bg-gray-100 border border-gray-300 text-gray-600 text-xs font-semibold rounded-lg hover:bg-gray-200 transition-all">
                            ↩ 復原去背
                        </button>
                    </div>
                </div>

                <!-- 第三欄：命名設定 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-b pb-2">3. 命名設定</h3>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-700">前綴檔名</label>
                        <input type="text" id="prefix-input" placeholder="例如: pic" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-700">流水號起始值</label>
                        <input type="text" id="start-index-input" value="01" placeholder="例如: 07" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                    </div>
                    <p class="text-xs text-gray-400 italic">* 系統會根據起始值的長度自動補零 (例如 07 -> 08, 09, 10)</p>
                </div>

                <!-- 第四欄：擴張邊界 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-b pb-2">4. 擴張邊界</h3>
                    <div class="space-y-3">
                        <!-- 貼合邊緣 -->
                        <label class="flex items-start gap-2 cursor-pointer p-2 bg-indigo-50 border border-indigo-200 rounded-lg">
                            <input type="checkbox" id="trim-to-opaque" class="w-4 h-4 mt-0.5 text-indigo-600 flex-shrink-0">
                            <div>
                                <span class="text-sm font-semibold text-indigo-800">貼合邊緣</span>
                                <p class="text-xs text-indigo-600 mt-0.5">偵測每格不透明區域的最小邊界框，以該尺寸 m×n 作為裁切基準（尤其適用去背後）</p>
                            </div>
                        </label>
                        <!-- 圖片置中 -->
                        <label class="flex items-start gap-2 cursor-pointer p-2 bg-purple-50 border border-purple-200 rounded-lg">
                            <input type="checkbox" id="center-content" class="w-4 h-4 mt-0.5 text-purple-600 flex-shrink-0">
                            <div>
                                <span class="text-sm font-semibold text-purple-800">圖片置中</span>
                                <p class="text-xs text-purple-600 mt-0.5">儲存時將不透明內容置於輸出畫布正中央，避免去背後圖案偏向一側</p>
                            </div>
                        </label>
                        <hr class="border-gray-200"/>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="border-option" value="none" checked class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">不擴張</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="border-option" value="expand" class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">擴張邊界 (透明像素)</span>
                        </label>
                        <!-- 示意圖：四方向輸入框 -->
                        <div id="border-inputs" class="hidden mt-1">
                            <div class="flex flex-col items-center gap-1">
                                <!-- 上 -->
                                <div class="flex flex-col items-center gap-0.5">
                                    <label class="text-xs text-gray-500 font-medium">上 (px)</label>
                                    <input type="number" id="border-t" value="5" class="w-14 px-1 py-1 border border-blue-400 rounded text-sm text-center outline-none focus:ring-2 focus:ring-blue-400"/>
                                </div>
                                <!-- 中排：左、圖示方框、右 -->
                                <div class="flex items-center gap-2">
                                    <div class="flex flex-col items-center gap-0.5">
                                        <label class="text-xs text-gray-500 font-medium">左 (px)</label>
                                        <input type="number" id="border-l" value="5" class="w-14 px-1 py-1 border border-blue-400 rounded text-sm text-center outline-none focus:ring-2 focus:ring-blue-400"/>
                                    </div>
                                    <!-- 中心示意圖框 -->
                                    <div style="width:60px;height:44px;background:linear-gradient(135deg,#dbeafe,#eff6ff);border:2px solid #3b82f6;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;">
                                        <svg width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <rect x="2" y="2" width="24" height="16" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
                                            <line x1="9" y1="2" x2="9" y2="18" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2"/>
                                            <line x1="19" y1="2" x2="19" y2="18" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2"/>
                                            <line x1="2" y1="8" x2="26" y2="8" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2"/>
                                            <line x1="2" y1="13" x2="26" y2="13" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2"/>
                                        </svg>
                                        <!-- 四個方向箭頭 -->
                                        <span style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:10px;color:#3b82f6;">↑</span>
                                        <span style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:10px;color:#3b82f6;">↓</span>
                                        <span style="position:absolute;left:-10px;top:50%;transform:translateY(-50%);font-size:10px;color:#3b82f6;">←</span>
                                        <span style="position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:10px;color:#3b82f6;">→</span>
                                    </div>
                                    <div class="flex flex-col items-center gap-0.5">
                                        <label class="text-xs text-gray-500 font-medium">右 (px)</label>
                                        <input type="number" id="border-r" value="5" class="w-14 px-1 py-1 border border-blue-400 rounded text-sm text-center outline-none focus:ring-2 focus:ring-blue-400"/>
                                    </div>
                                </div>
                                <!-- 下 -->
                                <div class="flex flex-col items-center gap-0.5">
                                    <input type="number" id="border-b" value="5" class="w-14 px-1 py-1 border border-blue-400 rounded text-sm text-center outline-none focus:ring-2 focus:ring-blue-400"/>
                                    <label class="text-xs text-gray-500 font-medium">下 (px)</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 第五欄：輸出設定與執行 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-b pb-2">5. 輸出設定</h3>
                    <div class="space-y-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="size-option" value="original" checked class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">小圖尺寸不變</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="size-option" value="custom" class="w-4 h-4 text-blue-600">
                            <span class="text-sm text-gray-700">變更為 A x B 像素</span>
                        </label>
                        <div id="custom-size-inputs" class="grid grid-cols-2 gap-2 hidden">
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-gray-500">寬 (px)</label>
                                <input type="number" id="custom-w" value="370" class="px-2 py-1 border border-gray-300 rounded text-sm outline-none"/>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-gray-500">高 (px)</label>
                                <input type="number" id="custom-h" value="320" class="px-2 py-1 border border-gray-300 rounded text-sm outline-none"/>
                            </div>
                        </div>
                    </div>
                    <button id="cut-btn" disabled class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all shadow-md active:scale-95 mt-4">
                        切割並下載 .zip
                    </button>
                </div>
            </div>
        </div>

        <div class="flex flex-col">
            <!-- 縮放指示列：比例 + 復原按鈕 + 水平捲軸 -->
            <div id="zoom-indicator" class="hidden w-full mb-1 flex items-center gap-3">
                <span id="zoom-label" class="px-3 py-1 bg-gray-800 text-white text-xs rounded-full whitespace-nowrap">縮放: 100%</span>
                <button id="reset-view-btn" class="px-3 py-1 bg-white border border-gray-300 text-gray-600 text-xs rounded-full hover:bg-gray-100 whitespace-nowrap">↺ 復原</button>
                <input type="range" id="scroll-x" min="0" max="1000" value="500" class="flex-1 h-1.5 accent-blue-500 cursor-pointer"/>
                <span class="text-xs text-gray-400 whitespace-nowrap">←→</span>
            </div>
            <!-- 預覽區 + 垂直捲軸 -->
            <div class="flex w-full gap-1">
                <div id="drop-zone" class="drop-zone flex-1 border-2 border-dashed border-gray-300 rounded-2xl relative overflow-hidden bg-white" style="height:75vh; min-height:300px;">
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                        <div class="text-5xl mb-4">📤</div>
                        <p>請上傳圖片或將圖片拖拽至此</p>
                    </div>
                    <div id="preview-wrapper" class="preview-container hidden absolute inset-0">
                        <div id="zoom-content" class="zoom-content">
                            <img id="main-image" src="" alt="Preview" class="block w-full h-full">
                            <canvas id="grid-overlay"></canvas>
                        </div>
                    </div>
                </div>
                <!-- 垂直捲軸 -->
                <div id="scroll-y-wrap" class="hidden flex items-stretch" style="width:20px;">
                    <input type="range" id="scroll-y" min="0" max="1000" value="500"
                        style="writing-mode:vertical-lr;direction:rtl;width:20px;height:100%;"
                        class="accent-blue-500 cursor-pointer"/>
                </div>
            </div>
        </div>
        <div id="status" class="text-center mt-4 text-sm text-blue-600 font-medium hidden">
            正在處理圖片，請稍候...
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const colsInput = document.getElementById('cols-input');
        const rowsInput = document.getElementById('rows-input');
        const prefixInput = document.getElementById('prefix-input');
        const startIndexInput = document.getElementById('start-index-input');
        const customSizeInputs = document.getElementById('custom-size-inputs');
        const customWInput = document.getElementById('custom-w');
        const customHInput = document.getElementById('custom-h');
        const borderInputs = document.getElementById('border-inputs');
        const borderT = document.getElementById('border-t');
        const borderB = document.getElementById('border-b');
        const borderL = document.getElementById('border-l');
        const borderR = document.getElementById('border-r');
        const cutBtn = document.getElementById('cut-btn');
        const mainImage = document.getElementById('main-image');
        const gridOverlay = document.getElementById('grid-overlay');
        const previewWrapper = document.getElementById('preview-wrapper');
        const zoomContent = document.getElementById('zoom-content');
        const emptyState = document.getElementById('empty-state');

        let originalImage = null;
        let originalFileName = "";
        let scale = 1.0;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        // 去背狀態
        let isEyedropperMode = false;
        let pickedColor = null;
        let bgRemovedDataUrl = null;
        let originalDataUrl = null;
        let processedImage = null;

        const imgScaleXInput   = document.getElementById('img-scale-x');
        const imgScaleYInput   = document.getElementById('img-scale-y');
        const resetScaleBtn    = document.getElementById('reset-scale-btn');

        // 圖片調整參數（以虛擬畫布中心為錨點）
        let imgAdjOffsetX = 0;   // px，正值=向右
        let imgAdjOffsetY = 0;   // px，正值=向下
        let imgAdjScaleX  = 1.0; // x向縮放
        let imgAdjScaleY  = 1.0; // y向縮放

        // --- 事件監聽 ---
        fileInput.addEventListener('change', handleFileSelect);
        colsInput.addEventListener('input', updateGrid);

        // 容差滑桿
        toleranceInput.addEventListener('input', () => {

        // 預覽背景色按鈕
        document.querySelectorAll('.preview-bg-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.preview-bg-btn').forEach(b => {

        function applyPreviewBg() {
            if (previewBgColor === 'transparent') {
                zoomContent.classList.remove('solid-preview-bg');
                zoomContent.style.backgroundColor = '';

        // 預覽區復原 + 捲軸
        resetViewBtn.addEventListener('click', () => {
            if (!originalImage) return;
            scale = 1.0; offsetX = 0; offsetY = 0;
            syncScrollbars();
            updateTransform();
        });

        function syncScrollbars() {
            if (!originalImage) return;
            const rect = previewWrapper.getBoundingClientRect();
            const imgW = originalImage.naturalWidth * scale;
            const imgH = originalImage.naturalHeight * scale;
            // 捲軸值映射到 offsetX/offsetY
            // scrollX: 500 = 中間（offsetX = 0），範圍 0-1000
            const maxShiftX = Math.max(imgW, rect.width);
            const maxShiftY = Math.max(imgH, rect.height);
            scrollXInput.value = Math.round(500 - (offsetX / maxShiftX) * 500);
            scrollYInput.value = Math.round(500 - (offsetY / maxShiftY) * 500);
        }

        scrollXInput.addEventListener('input', () => {
            if (!originalImage) return;
            const rect = previewWrapper.getBoundingClientRect();
            const imgW = originalImage.naturalWidth * scale;
            const maxShiftX = Math.max(imgW, rect.width);
            offsetX = (500 - parseInt(scrollXInput.value)) / 500 * maxShiftX;
            updateTransform();
        });

        scrollYInput.addEventListener('input', () => {
            if (!originalImage) return;
            const rect = previewWrapper.getBoundingClientRect();
            const imgH = originalImage.naturalHeight * scale;
            const maxShiftY = Math.max(imgH, rect.height);
            offsetY = (500 - parseInt(scrollYInput.value)) / 500 * maxShiftY;
            updateTransform();
        });

        // 重新載入圖片
        reloadBtn.addEventListener('click', () => {
            if (!originalDataUrl) return;
            bgRemovedDataUrl = null;
            pickedColor = null;
            pickedColorDisplay.classList.add('hidden');
            exitEyedropperMode();
            imgAdjOffsetX = 0; imgAdjOffsetY = 0; imgAdjScaleX = 1.0; imgAdjScaleY = 1.0;
            imgOffsetXInput.value = 0; imgOffsetYInput.value = 0;
            imgScaleXInput.value = 100; imgScaleYInput.value = 100;
            document.querySelector('input[name="bg-remove-option"][value="none"]').checked = true;
            bgRemoveOptions.classList.add('hidden');
            renderVirtualCanvas();
        });

        // 移動圖片開關
        enableMoveChk.addEventListener('change', () => {
            moveControls.classList.toggle('hidden', !enableMoveChk.checked);
            if (!enableMoveChk.checked) { imgAdjOffsetX = 0; imgAdjOffsetY = 0; imgOffsetXInput.value = 0; imgOffsetYInput.value = 0; renderVirtualCanvas(); }
        });
        imgOffsetXInput.addEventListener('input', () => { imgAdjOffsetX = parseFloat(imgOffsetXInput.value) || 0; renderVirtualCanvas(); });
        imgOffsetYInput.addEventListener('input', () => { imgAdjOffsetY = parseFloat(imgOffsetYInput.value) || 0; renderVirtualCanvas(); });
        resetMoveBtn.addEventListener('click', () => { imgAdjOffsetX = 0; imgAdjOffsetY = 0; imgOffsetXInput.value = 0; imgOffsetYInput.value = 0; renderVirtualCanvas(); });

        // 縮放圖片開關（X/Y 分開）
        enableScaleChk.addEventListener('change', () => {
            scaleControls.classList.toggle('hidden', !enableScaleChk.checked);
            if (!enableScaleChk.checked) { imgAdjScaleX = 1.0; imgAdjScaleY = 1.0; imgScaleXInput.value = 100; imgScaleYInput.value = 100; renderVirtualCanvas(); }
        });
        imgScaleXInput.addEventListener('input', () => { imgAdjScaleX = (parseFloat(imgScaleXInput.value) || 100) / 100; renderVirtualCanvas(); });
        imgScaleYInput.addEventListener('input', () => { imgAdjScaleY = (parseFloat(imgScaleYInput.value) || 100) / 100; renderVirtualCanvas(); });
        resetScaleBtn.addEventListener('click', () => { imgAdjScaleX = 1.0; imgAdjScaleY = 1.0; imgScaleXInput.value = 100; imgScaleYInput.value = 100; renderVirtualCanvas(); });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        });

        // 圖片點擊（滴管模式）
        mainImage.addEventListener('click', (e) => {
            if (!isEyedropperMode) return;
            e.stopPropagation();

            // 計算點擊位置對應到原圖座標
            const rect = mainImage.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const imgX = Math.round(clickX * mainImage.naturalWidth / rect.width);
            const imgY = Math.round(clickY * mainImage.naturalHeight / rect.height);

            // 用 canvas 取色
            const sampleCanvas = document.createElement('canvas');
            sampleCanvas.width = mainImage.naturalWidth;
            sampleCanvas.height = mainImage.naturalHeight;
            const sCtx = sampleCanvas.getContext('2d');
            // 用原始 dataUrl 確保取到未去背的顏色
            const srcImg = new Image();
            srcImg.onload = () => {
                sCtx.drawImage(srcImg, 0, 0);
                const px = sCtx.getImageData(imgX, imgY, 1, 1).data;
                pickedColor = { r: px[0], g: px[1], b: px[2] };

                // 顯示取色結果
                const hex = '#' + [px[0], px[1], px[2]].map(v => v.toString(16).padStart(2, '0')).join('');
                pickedColorSwatch.style.background = hex;
                pickedColorText.textContent = `RGB(${px[0]}, ${px[1]}, ${px[2]})  ${hex.toUpperCase()}`;
                pickedColorDisplay.classList.remove('hidden');

                exitEyedropperMode();
                applyBgRemoval();
            };
            srcImg.src = originalDataUrl;
        });

        previewWrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.05 : -0.05;
            const newScale = Math.min(Math.max(scale + delta, 0.2), 3.0);
            const rect = previewWrapper.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const worldX = (mouseX - offsetX) / scale;
            const worldY = (mouseY - offsetY) / scale;
            scale = newScale;
            offsetX = mouseX - worldX * scale;
            offsetY = mouseY - worldY * scale;
            updateTransform();
        }, { passive: false });

        previewWrapper.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || isEyedropperMode) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            previewWrapper.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            updateTransform(); // updateTransform calls syncScrollbars internally
        });
        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                if (!isEyedropperMode) previewWrapper.style.cursor = '';
            }
        });

        // ---- 滴管模式 ----
        function enterEyedropperMode() {
            isEyedropperMode = true;
            mainImage.style.cursor = 'crosshair';
            previewWrapper.style.cursor = 'crosshair';
            eyedropperBtn.textContent = '🎯 請點選圖片上的背景色...';
            eyedropperBtn.classList.replace('bg-amber-50', 'bg-amber-200');
        }
        function exitEyedropperMode() {
            isEyedropperMode = false;
            mainImage.style.cursor = '';
            previewWrapper.style.cursor = '';
            eyedropperBtn.textContent = '🩸 點選圖片取色';
            eyedropperBtn.classList.replace('bg-amber-200', 'bg-amber-50');
        }

        // ---- 去背核心邏輯 ----
        function applyBgRemoval() {
            if (!pickedColor || !originalDataUrl) return;
            const tol = parseInt(toleranceInput.value);
            const mode = document.querySelector('input[name="bg-mode"]:checked').value;

            const srcImg = new Image();
            srcImg.onload = () => {
                const w = srcImg.naturalWidth;
                const h = srcImg.naturalHeight;
                const offCanvas = document.createElement('canvas');
                offCanvas.width = w; offCanvas.height = h;
                const ctx = offCanvas.getContext('2d');
                ctx.drawImage(srcImg, 0, 0);
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                const { r: tr, g: tg, b: tb } = pickedColor;

                if (mode === 'global') {
                    // 全圖模式：所有符合的像素都去掉
                    for (let i = 0; i < data.length; i += 4) {
                        if (colorMatch(data[i], data[i+1], data[i+2], tr, tg, tb, tol)) {
                            data[i+3] = 0;
                        }
                    }
                } else {
                    // 連通區域模式（BFS flood fill）從四個角落開始
                    const visited = new Uint8Array(w * h);
                    const queue = [];
                    // 從圖片四角開始找連通的背景
                    const seeds = [[0,0],[w-1,0],[0,h-1],[w-1,h-1]];
                    seeds.forEach(([sx, sy]) => {
                        const idx = sy * w + sx;
                        const pi = idx * 4;
                        if (!visited[idx] && colorMatch(data[pi], data[pi+1], data[pi+2], tr, tg, tb, tol)) {
                            queue.push(idx);
                            visited[idx] = 1;
                        }
                    });
                    while (queue.length > 0) {
                        const idx = queue.pop();
                        data[idx*4+3] = 0;
                        const x = idx % w;
                        const y = Math.floor(idx / w);
                        const neighbors = [
                            y > 0   ? idx - w : -1,
                            y < h-1 ? idx + w : -1,
                            x > 0   ? idx - 1 : -1,
                            x < w-1 ? idx + 1 : -1
                        ];
                        for (const ni of neighbors) {
                            if (ni < 0 || visited[ni]) continue;
                            const pi = ni * 4;
                            if (colorMatch(data[pi], data[pi+1], data[pi+2], tr, tg, tb, tol)) {
                                visited[ni] = 1;
                                queue.push(ni);
                            }
                        }
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                bgRemovedDataUrl = offCanvas.toDataURL('image/png');
                // 去背完成後重新合成虛擬畫布（含移動/縮放）
                renderVirtualCanvas();
            };
            srcImg.src = originalDataUrl;
        }

        function colorMatch(r, g, b, tr, tg, tb, tol) {
            return Math.abs(r - tr) <= tol && Math.abs(g - tg) <= tol && Math.abs(b - tb) <= tol;
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            originalFileName = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalDataUrl = e.target.result;
                bgRemovedDataUrl = null;
                pickedColor = null;
                pickedColorDisplay.classList.add('hidden');
                exitEyedropperMode();
                // 重置移動/縮放
                imgAdjOffsetX = 0; imgAdjOffsetY = 0; imgAdjScaleX = 1.0; imgAdjScaleY = 1.0;
                imgOffsetXInput.value = 0; imgOffsetYInput.value = 0;
                imgScaleXInput.value = 100; imgScaleYInput.value = 100;

                const tempImg = new Image();
                tempImg.onload = () => {
                    originalImage = tempImg;
                    imageInfo.textContent = `${tempImg.naturalWidth} x ${tempImg.naturalHeight}`;
                    previewWrapper.classList.remove('hidden');
                    scrollYWrap.classList.remove('hidden');
                    zoomIndicator.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                    cutBtn.disabled = false;
                    reloadBtn.disabled = false;
                    scale = 1.0; offsetX = 0; offsetY = 0;
                    const rect = previewWrapper.getBoundingClientRect();
                    if (tempImg.naturalWidth > rect.width) scale = rect.width / tempImg.naturalWidth;
                    updateTransform();
                    renderVirtualCanvas();
                };
                tempImg.src = originalDataUrl;
            };
            reader.readAsDataURL(file);
        }

        // ---- 虛擬畫布渲染 ----
        function renderVirtualCanvas() {
            if (!originalImage) return;

            const srcDataUrl = bgRemovedDataUrl || originalDataUrl;
            const vW = originalImage.naturalWidth;
            const vH = originalImage.naturalHeight;

            const srcImg = new Image();
            srcImg.onload = () => {
                const offC = document.createElement('canvas');
                offC.width = vW; offC.height = vH;
                const ctx = offC.getContext('2d');
                ctx.clearRect(0, 0, vW, vH);

                // X/Y 分開縮放，以虛擬畫布中心為錨點
                const drawW = srcImg.naturalWidth  * imgAdjScaleX;
                const drawH = srcImg.naturalHeight * imgAdjScaleY;
                const drawX = (vW - drawW) / 2 + imgAdjOffsetX;
                const drawY = (vH - drawH) / 2 + imgAdjOffsetY;

                ctx.drawImage(srcImg, drawX, drawY, drawW, drawH);

                const compositeUrl = offC.toDataURL('image/png');

                // 獨立 Image 物件供切割用
                const cutImg = new Image();
                cutImg.onload = () => { processedImage = cutImg; };
                cutImg.src = compositeUrl;

                // 更新預覽顯示
                mainImage.src = compositeUrl;
                zoomContent.style.width = vW + 'px';
                zoomContent.style.height = vH + 'px';
                updateGrid();
            };
            srcImg.src = srcDataUrl;
        }

        function updateTransform() {
            zoomContent.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            if (zoomLabel) zoomLabel.textContent = `縮放: ${Math.round(scale * 100)}%`;
            syncScrollbars();
        }

        function updateGrid() {
            if (!originalImage) return;
            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const vW = originalImage.naturalWidth;
            const vH = originalImage.naturalHeight;
            gridOverlay.width = vW;
            gridOverlay.height = vH;
            const ctx = gridOverlay.getContext('2d');
            ctx.clearRect(0, 0, vW, vH);
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            const stepX = vW / cols;
            const stepY = vH / rows;
            for (let i = 1; i < cols; i++) {
                ctx.beginPath(); ctx.moveTo(i * stepX, 0); ctx.lineTo(i * stepX, vH); ctx.stroke();
            }
            for (let j = 1; j < rows; j++) {
                ctx.beginPath(); ctx.moveTo(0, j * stepY); ctx.lineTo(vW, j * stepY); ctx.stroke();
            }
        }

        // ---- 貼合邊緣：找不透明區域的最小邊界框 ----
        function findOpaqueBounds(imageData, x0, y0, w, h, fullW) {
            const data = imageData.data;
            let minX = w, maxX = 0, minY = h, maxY = 0;
            let found = false;
            for (let ry = 0; ry < h; ry++) {
                for (let rx = 0; rx < w; rx++) {
                    const idx = ((y0 + ry) * fullW + (x0 + rx)) * 4;
                    if (data[idx + 3] > 0) {
                        if (rx < minX) minX = rx;
                        if (rx > maxX) maxX = rx;
                        if (ry < minY) minY = ry;
                        if (ry > maxY) maxY = ry;
                        found = true;
                    }
                }
            }
            if (!found) return { x: x0, y: y0, w: 1, h: 1 };
            return { x: x0 + minX, y: y0 + minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        async function processCutting() {
            if (!originalImage) return;

            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const srcForCut = processedImage || mainImage;
            const width = srcForCut.naturalWidth;
            const height = srcForCut.naturalHeight;

            const prefix = prefixInput.value;
            const startStr = startIndexInput.value || "1";
            const startNum = parseInt(startStr, 10) || 1;
            const padLen = startStr.length;
            const ext = ".png";

            const borderOption = document.querySelector('input[name="border-option"]:checked').value;
            const doBorder = borderOption === 'expand';
            const bT = doBorder ? parseInt(borderT.value) || 0 : 0;
            const bB = doBorder ? parseInt(borderB.value) || 0 : 0;
            const bL = doBorder ? parseInt(borderL.value) || 0 : 0;
            const bR = doBorder ? parseInt(borderR.value) || 0 : 0;

            const sizeOption = document.querySelector('input[name="size-option"]:checked').value;
            const doTrim = trimToOpaqueChk.checked;

            const pieceW = width / cols;
            const pieceH = height / rows;

            cutBtn.disabled = true;
            statusText.classList.remove('hidden');

            // 如果需要貼合邊緣，先把整張圖畫到 offscreen canvas 取 imageData
            let fullImageData = null;
            if (doTrim) {
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = width;
                fullCanvas.height = height;
                const fCtx = fullCanvas.getContext('2d');
                fCtx.drawImage(srcForCut, 0, 0);
                fullImageData = fCtx.getImageData(0, 0, width, height);
            }

            const zip = new JSZip();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            let count = startNum;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const gx = Math.round(c * pieceW);
                    const gy = Math.round(r * pieceH);
                    const gw = Math.round((c + 1) * pieceW) - gx;
                    const gh = Math.round((r + 1) * pieceH) - gy;

                    let srcX = gx, srcY = gy, srcW = gw, srcH = gh;

                    // 貼合邊緣：找不透明最小框
                    if (doTrim && fullImageData) {
                        const bounds = findOpaqueBounds(fullImageData, gx, gy, gw, gh, width);
                        srcX = bounds.x; srcY = bounds.y; srcW = bounds.w; srcH = bounds.h;
                    }

                    // 加上擴張邊界 + 圖片置中
                    const doCenterContent = centerContentChk.checked;

                    let outW, outH, cX, cY, cW, cH;

                    if (doCenterContent) {
                        // 圖片置中：永遠自己掃描不透明最小框，再置中到 gw×gh 輸出畫布
                        let centerImageData = fullImageData;
                        if (!centerImageData) {
                            const tmpC = document.createElement('canvas');
                            tmpC.width = width; tmpC.height = height;
                            tmpC.getContext('2d').drawImage(srcForCut, 0, 0);
                            centerImageData = tmpC.getContext('2d').getImageData(0, 0, width, height);
                        }
                        const cb = findOpaqueBounds(centerImageData, gx, gy, gw, gh, width);
                        cX = cb.x; cY = cb.y; cW = cb.w; cH = cb.h;

                        // 輸出畫布 = 格子原始尺寸 gw×gh + 擴邊
                        outW = gw + bL + bR;
                        outH = gh + bT + bB;
                        const finalW2 = sizeOption === 'custom' ? parseInt(customWInput.value) : outW;
                        const finalH2 = sizeOption === 'custom' ? parseInt(customHInput.value) : outH;
                        canvas.width = finalW2;
                        canvas.height = finalH2;
                        ctx.clearRect(0, 0, finalW2, finalH2);

                        // 可用區域（扣掉擴邊）
                        const availW = finalW2 - bL - bR;
                        const availH = finalH2 - bT - bB;
                        // 不縮放，1:1 把不透明框畫到可用區域正中央
                        const destX = bL + (availW - cW) / 2;
                        const destY = bT + (availH - cH) / 2;
                        ctx.drawImage(srcForCut, cX, cY, cW, cH, destX, destY, cW, cH);
                    } else {
                        // 非置中：輸出畫布 = srcW×srcH（貼合或整格）+ 擴邊
                        outW = srcW + bL + bR;
                        outH = srcH + bT + bB;
                        const finalW2 = sizeOption === 'custom' ? parseInt(customWInput.value) : outW;
                        const finalH2 = sizeOption === 'custom' ? parseInt(customHInput.value) : outH;
                        canvas.width = finalW2;
                        canvas.height = finalH2;
                        ctx.clearRect(0, 0, finalW2, finalH2);
                        const scaleX2 = finalW2 / outW;
                        const scaleY2 = finalH2 / outH;
                        ctx.drawImage(srcForCut, srcX, srcY, srcW, srcH, bL * scaleX2, bT * scaleY2, srcW * scaleX2, srcH * scaleY2);
                    }

                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    const seq = String(count).padStart(padLen, '0');
                    zip.file(`${prefix}${seq}${ext}`, blob);
                    count++;
                }
            }

            const content = await zip.generateAsync({ type: 'blob' });
            saveAs(content, 'cut_images.zip');
            statusText.classList.add('hidden');
            cutBtn.disabled = false;
        }
    </script>
</body>
</html>
